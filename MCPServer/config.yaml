# MCPServer 日志配置文件样例

# 日志记录级别：DEBUG / INFO / WARNING / ERROR / CRITICAL
log_level: DEBUG

# 日志文件路径
log_file: logs/mcp_operation.log

# 单文件最大字节数（10 MB）
max_bytes: 10485760

# 保留的备份文件数量
backup_count: 30

# 日志文件编码
log_encoding: utf-8

# 控制台日志级别
console_level: DEBUG

# 控制台日志格式
console_format: "[%(asctime)s] %(levelname)s %(name)s - %(message)s"
console_date_format: "%Y-%m-%d %H:%M:%S"

# 文件日志级别
file_level: DEBUG

# 文件日志格式
file_format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
file_date_format: "%Y-%m-%d:%H:%M:%S"
