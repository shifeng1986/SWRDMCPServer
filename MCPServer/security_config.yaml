# MCPServer 安全配置文件

# 是否使能高危检查（全局开关）
enabled: true

# 确认有效期（秒），高危操作确认后在此时间内无需再次确认
confirm_expire_seconds: 300

# 操作风险等级映射：将 Redfish HTTP 方法映射为风险等级
# 可选等级：low / medium / high / critical
risk_level_mapping:
  GET: low
  POST: high
  PATCH: high
  PUT: high
  DELETE: critical
  # 未匹配的方法默认等级
  default: medium

# 各风险等级的处理策略
# 可选策略：
#   block   - 直接拦截，抛出 SecurityCheckError
#   confirm - 需要确认，抛出 ConfirmationRequired
#   log     - 仅记录日志，允许执行
#   allow   - 直接允许，不记录日志
actions:
  critical: block
  high: confirm
  medium: log
  low: log

# ──────────────────────────────────────────────
# 用户认证配置
# ──────────────────────────────────────────────

# 是否启用用户认证（全局开关）
# 启用后，所有 MCP 请求必须携带有效 Token
auth:
  enabled: true

  # 服务端固定 Token（用于 MCP Client 配置）
  # 若为空，则启动时自动生成随机 Token 并打印到控制台
  # 建议生产环境设置为固定值，便于 MCP Client 配置
  token: "swrd-mcp-server-token-2026"

  # 用户名/密码列表（用于 authenticate 工具登录，本地认证备用）
  # 登录成功后会生成临时 Token，有效期由 token_expire_seconds 控制
  users:
    admin: admin123
    operator: operator123
  
  # 用户登录 Token 有效期（秒）
  token_expire_seconds: 3600

  # ──────────────────────────────────────────────
  # LDAP认证配置
  # ──────────────────────────────────────────────
  ldap:
    # 是否启用LDAP认证（优先级高于本地认证）
    enabled: true

    # LDAP服务器URI
    server_uri: "ldap://10.153.0.61:3268"

    # LDAP绑定DN（用于搜索用户）
    bind_dn: "Apprdswrdpubsyn@h3c.huawei-3com.com"

    # LDAP绑定密码
    bind_password: "Public_SWRD"

    # LDAP用户搜索基础DN
    user_search_base: "dc=h3c,dc=huawei-3com,dc=com"

    # LDAP用户搜索过滤器
    user_search_filter: "(sAMAccountName=%(user)s)"
